<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #ffffff;
      overflow: hidden;
    }
    #vizContainer {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    tableau-viz {
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading dashboard…</div>

  <div id="vizContainer">
    <tableau-viz
      id="tableauViz"
      src="https://public.tableau.com/views/WOW2026Week3CanyoucreateKPIcardswithvizextensions/WOW2026Week3CanyoucreateKPIcards"
      toolbar="bottom"
      hide-tabs>
    </tableau-viz>
  </div>

  <!-- Tableau Public Embedding API v3 -->
  <script type="module"
    src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>

  <script type="module">
    const viz = document.getElementById('tableauViz');
    const loading = document.getElementById('loading');

    // Hide the loading text once the viz is interactive
    viz.addEventListener('firstinteractive', () => {
      if (loading) loading.style.display = 'none';
    });
  </script>
</body>
</html>
